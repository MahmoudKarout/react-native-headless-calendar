<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="gm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#007cf0"/>
      <stop offset="50%"  stop-color="#7928ca"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <style>
      .tile { fill: #171717; }
      .grid { fill: #ededed; }
      .bar  { fill: #262626; }
      @media (prefers-color-scheme: dark) {
        .tile { fill: #ededed; }
        .grid { fill: #171717; }
        .bar  { fill: #d4d4d4; }
      }
    </style>
  </defs>
  <!-- ink tile with rounded corners -->
  <rect x="2" y="2" width="28" height="28" rx="6" class="tile"/>
  <!-- subtle top bar -->
  <rect x="2" y="2" width="28" height="8" rx="6" class="bar"/>
  <rect x="2" y="6" width="28" height="4" class="bar"/>
  <!-- calendar grid cells -->
  <rect x="6"  y="13" width="5" height="5" rx="1.2" class="grid"/>
  <rect x="13" y="13" width="5" height="5" rx="1.2" class="grid" opacity="0.5"/>
  <rect x="20" y="13" width="5" height="5" rx="1.2" class="grid" opacity="0.5"/>
  <rect x="6"  y="21" width="5" height="5" rx="1.2" class="grid" opacity="0.5"/>
  <!-- "today" cell — single mesh-gradient accent pixel -->
  <rect x="13" y="21" width="5" height="5" rx="1.2" fill="url(#gm)"/>
  <rect x="20" y="21" width="5" height="5" rx="1.2" class="grid" opacity="0.5"/>
</svg>
